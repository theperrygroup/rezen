name: Weekly Security Audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  SECURITY_PR_BRANCH: "automation/weekly-security-updates"

concurrency:
  group: "weekly-security-audit"
  cancel-in-progress: false

jobs:
  audit-and-remediate:
    name: Audit And Remediate Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt', 'docs/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-
            ${{ runner.os }}-pip-

      - name: Install security audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Attempt direct dependency remediations
        id: fixes
        run: |
          set +e
          fix_exit_code=0

          run_fix() {
            echo "Running: $*"
            if ! "$@"; then
              fix_exit_code=1
            fi
          }

          run_fix pip-audit --fix -r requirements.txt
          run_fix pip-audit --fix -r requirements-dev.txt
          run_fix pip-audit --fix -r docs/requirements.txt
          python tools/sync_security_dependency_versions.py

          echo "fix_exit_code=$fix_exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Detect manifest changes
        id: changes
        run: |
          if git diff --quiet -- pyproject.toml requirements.txt requirements-dev.txt docs/requirements.txt; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate vulnerability reports
        id: audit
        run: |
          set +e
          audit_exit_code=0

          run_audit() {
            echo "Running: $*"
            if ! "$@"; then
              audit_exit_code=1
            fi
          }

          run_audit pip-audit --format json --output security-audit-project.json .
          run_audit pip-audit --format json --output security-audit-requirements.json -r requirements.txt
          run_audit pip-audit --format json --output security-audit-requirements-dev.json -r requirements-dev.txt
          run_audit pip-audit --format json --output security-audit-docs.json -r docs/requirements.txt

          echo "audit_exit_code=$audit_exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Create or update remediation PR
        id: create-pr
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.SECURITY_PR_BRANCH }}
          base: main
          delete-branch: true
          commit-message: "chore: remediate vulnerable dependencies"
          title: "chore: weekly security dependency updates"
          body: |
            ## Summary
            - remediate fixable dependency vulnerabilities across the tracked manifests
            - sync `pyproject.toml` lower bounds with the requirements files after `pip-audit` updates
            - trigger the normal CI workflow on the remediation branch before merge

            ## Test plan
            - [ ] Review the uploaded `pip-audit` JSON artifacts from this workflow run
            - [ ] Confirm `.github/workflows/ci.yml` passes on this PR
          labels: |
            dependencies
            security
          assignees: |
            theperrygroup
          reviewers: |
            theperrygroup

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-reports
          path: |
            security-audit-project.json
            security-audit-requirements.json
            security-audit-requirements-dev.json
            security-audit-docs.json
          retention-days: 30

      - name: Write workflow summary
        if: always()
        run: |
          echo "## Weekly Security Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest changes detected: ${{ steps.changes.outputs.has_changes }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Automated remediation completed with warnings: ${{ steps.fixes.outputs.fix_exit_code != '0' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Remaining vulnerabilities after remediation: ${{ steps.audit.outputs.audit_exit_code != '0' }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
            echo "- Remediation PR: ${{ steps.create-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Remediation PR: not created" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if vulnerabilities remain
        if: steps.audit.outputs.audit_exit_code != '0'
        run: |
          echo "Dependency vulnerabilities remain after automated remediation."
          exit 1
